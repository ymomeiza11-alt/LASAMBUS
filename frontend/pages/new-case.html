<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — New Case</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">New Case</h1>

      <div class="card" style="max-width:720px;">
        <h2 class="section-heading mb-16">Case <span id="new-case-id" style="color:var(--color-dark-blue);">New Case ID: Auto-generated</span></h2>

        <form id="newCaseForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label>Date of Incident</label>
              <input type="date" id="date-of-incident" readonly />
            </div>
            <div class="form-group">
              <label>Time of Incident</label>
              <input type="time" id="time-of-incident" step="1" readonly />
            </div>
          </div>

          <div class="form-group">
            <label>Notified By <span class="req">*</span></label>
            <select id="notified-by" required>
              <option value="">-- Select --</option>
              <option>Call Center</option>
              <option>Hospital or Healthcare Facility</option>
              <option>Law Enforcement</option>
              <option>LATSMA</option>
              <option>Bystander/Witness</option>
              <option>Family Member or Caregiver</option>
              <option>Public Service (School Nurse, Govt Staff, LSNC, Other Govt Agency)</option>
              <option>Community Organizations (CDA, Red Cross Volunteer, Community Watch Member)</option>
              <option>Self Initiated (e.g. For Training, Community Event Coverage)</option>
              <option>Others</option>
            </select>
            <span class="error-msg" id="err-notified-by">This field is required.</span>
          </div>

          <div class="form-group">
            <label>Local Government Area <span class="req">*</span></label>
            <select id="lga-lcda" required>
              <option value="">-- Select LGA/LCDA --</option>
              <option>Agege</option><option>Ajeromi-Ifelodun</option><option>Alimosho</option>
              <option>Amuwo-Odofin</option><option>Apapa</option><option>Badagry</option>
              <option>Epe</option><option>Eti-Osa</option><option>Ibeju-Lekki</option>
              <option>Ifako-Ijaiye</option><option>Ikeja</option><option>Ikorodu</option>
              <option>Kosofe</option><option>Lagos Island</option><option>Lagos Mainland</option>
              <option>Mushin</option><option>Ojo</option><option>Oshodi-Isolo</option>
              <option>Somolu</option><option>Surulere</option>
            </select>
            <span class="error-msg" id="err-lga">This field is required.</span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Incident Type <span class="req">*</span></label>
              <select id="incident-type" required>
                <option value="">-- Select --</option>
                <option>Road Traffic Accident</option>
                <option>Trauma</option>
                <option>Fire Incident</option>
                <option>Medical Emergencies</option>
                <option>Obstetric/Gynecological</option>
                <option>Pediatrics</option>
                <option>Environmental</option>
                <option>Behavioural Health</option>
                <option>Mass Casualty</option>
                <option>Vehicle Extrication</option>
                <option>Special Events</option>
                <option>Elderly Care</option>
                <option>Non-Emergency Transport</option>
                <option>Public Assistance</option>
                <option>Mass Casualty Incident (MCI)</option>
                <option>Hazards/Disasters</option>
                <option>Others</option>
              </select>
              <span class="error-msg" id="err-incident-type">This field is required.</span>
            </div>

            <div class="form-group">
              <label>Incident Severity <span class="req">*</span></label>
              <select id="incident-severity" required>
                <option value="">-- Select --</option>
                <option>Minor</option>
                <option>Moderate</option>
                <option>Major</option>
                <option>Severe</option>
                <option>Critical</option>
                <option>Other</option>
              </select>
              <span class="error-msg" id="err-severity">This field is required.</span>
            </div>
          </div>

          <div class="form-group">
            <label>Incident Location <span class="req">*</span></label>
            <textarea id="incident-location" placeholder="Enter the full location of the incident" required></textarea>
            <span class="error-msg" id="err-location">This field is required.</span>
          </div>

          <div class="form-group">
            <label>Incident Description <span class="req">*</span></label>
            <textarea id="incident-description" placeholder="Describe the incident" style="min-height:120px;" required></textarea>
            <span class="error-msg" id="err-description">This field is required.</span>
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Submit and Open Case
          </button>
        </form>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/new-case.js"></script>
</body>
</html>
