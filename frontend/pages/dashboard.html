<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">Dashboard</h1>

      <!-- Quick summaries -->
      <div class="dash-summary-strip">
        <div class="dash-metric-card" style="--accent: var(--color-dark-blue);">
          <div class="dash-metric-icon" style="background: rgba(0,53,128,0.1); color: var(--color-dark-blue);">
            <i class="bi bi-folder2-open"></i>
          </div>
          <div class="dash-metric-body">
            <div class="dash-metric-value" id="stat-cases-month">24</div>
            <div class="dash-metric-label">Cases This Month</div>
          </div>
          <div class="dash-metric-accent" style="background: var(--color-dark-blue);"></div>
        </div>

        <div class="dash-metric-card" style="--accent: var(--color-green);">
          <div class="dash-metric-icon" style="background: rgba(40,167,69,0.1); color: var(--color-green);">
            <i class="bi bi-check2-circle"></i>
          </div>
          <div class="dash-metric-body">
            <div class="dash-metric-value" id="stat-completed">18</div>
            <div class="dash-metric-label">Cases Completed</div>
          </div>
          <div class="dash-metric-accent" style="background: var(--color-green);"></div>
        </div>

        <div class="dash-metric-card" style="--accent: var(--color-yellow);">
          <div class="dash-metric-icon" style="background: rgba(255,193,7,0.15); color: #b38600;">
            <i class="bi bi-graph-up-arrow"></i>
          </div>
          <div class="dash-metric-body">
            <div class="dash-metric-value" id="stat-success-rate">75%</div>
            <div class="dash-metric-label">Call Success Rate</div>
          </div>
          <div class="dash-metric-accent" style="background: var(--color-yellow);"></div>
        </div>
      </div>

      <!-- New Case Action -->
      <div class="flex gap-12 mb-24">
        <button class="btn btn-primary" onclick="openNewCaseOverlay()">
          <i class="bi bi-plus-lg"></i> New Case
        </button>
      </div>

      <!-- Recent cases table -->
      <div class="card">
        <h2 class="section-heading mb-16">Recent Cases</h2>
        <div class="table-wrapper">
          <table id="dashboard-table">
            <thead>
              <tr>
                <th>S/N</th>
                <th>Date</th>
                <th>Incident Description</th>
                <th>Incident Location</th>
                <th>Situation on Arrival</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="dashboard-table-body">
            </tbody>
          </table>
        </div>

        <div class="flex gap-12 mt-24">
          <a href="cases.html" class="btn btn-primary">
            <i class="bi bi-folder2-open"></i> All Cases
          </a>
          <a href="report.html" class="btn btn-outline">
            <i class="bi bi-bar-chart-line"></i> Full Report
          </a>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
