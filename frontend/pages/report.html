<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">Report</h1>

      <!-- Filters -->
      <div class="card">
        <div class="flex justify-between align-center" style="flex-wrap:wrap; gap:10px;">
          <h2 class="section-heading" style="margin:0;">Metrics</h2>
          <button class="btn btn-outline" onclick="openReportFilterModal()">
            <i class="bi bi-funnel"></i> Filter
          </button>
        </div>
        <div id="report-active-filters" class="active-filters hidden" style="margin-top:12px;"></div>
      </div>

      <!-- Summary metrics -->
      <div class="report-metrics-grid">
        <div class="report-metric-card rm-blue">
          <i class="bi bi-folder2-open rm-icon"></i>
          <div class="rm-value" id="r-total-cases">142</div>
          <div class="rm-label">Total Cases</div>
        </div>
        <div class="report-metric-card rm-green">
          <i class="bi bi-graph-up-arrow rm-icon"></i>
          <div class="rm-value" id="r-success-rate">76%</div>
          <div class="rm-label">Case Success Rate</div>
        </div>
        <div class="report-metric-card rm-lblue">
          <i class="bi bi-calendar3 rm-icon"></i>
          <div class="rm-value" id="r-avg-monthly">11.8</div>
          <div class="rm-label">Avg Cases / Month</div>
        </div>
        <div class="report-metric-card rm-red">
          <i class="bi bi-x-circle rm-icon"></i>
          <div class="rm-value" id="r-cancelled">18</div>
          <div class="rm-label">Total Cancelled</div>
        </div>
        <div class="report-metric-card rm-yellow">
          <i class="bi bi-people rm-icon"></i>
          <div class="rm-value" id="r-total-patients">107</div>
          <div class="rm-label">Total Patients</div>
        </div>
      </div>

      <!-- Top 5 -->
      <div class="card">
        <div class="flex align-center gap-12 mb-16" style="flex-wrap:wrap;">
          <h2 class="section-heading" style="margin:0;">Top 5</h2>
          <select id="top5-selector" style="width:200px;">
            <option value="incident_type">Incident Types</option>
            <option value="lga">LGA/LCDA</option>
            <option value="severity">Incident Severity</option>
          </select>
          <button class="btn btn-primary" onclick="renderTop5()">Apply</button>
        </div>
        <div id="top5-chart"></div>
      </div>

      <!-- Action buttons -->
      <div class="flex gap-12">
        <a href="cases.html" class="btn btn-outline">
          <i class="bi bi-folder2-open"></i> View All Cases
        </a>
        <a href="dashboard.html" class="btn btn-outline">
          <i class="bi bi-speedometer2"></i> View Dashboard
        </a>

      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- Report Filter Modal -->
  <div class="filter-modal-backdrop" id="report-filter-modal">
    <div class="filter-modal">
      <div class="filter-modal-header">
        <h3>Filter Report</h3>
        <button class="filter-modal-close" onclick="closeReportFilterModal()">×</button>
      </div>
      <div class="filter-modal-body">
        <div class="filter-section">
          <span class="filter-section-label">Date Range</span>
          <div class="form-row">
            <div class="form-group" style="margin:0;">
              <label>From</label>
              <input type="date" id="rf-start-date" />
            </div>
            <div class="form-group" style="margin:0;">
              <label>To</label>
              <input type="date" id="rf-end-date" />
            </div>
          </div>
        </div>
      </div>
      <div class="filter-modal-footer">
        <button class="btn btn-secondary" onclick="closeReportFilterModal()">Cancel</button>
        <button class="btn btn-primary" onclick="applyReportFilter()">Apply</button>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/report.js"></script>
</body>
</html>
