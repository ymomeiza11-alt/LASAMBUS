<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LASAMBUS — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="../assets/LASAMBUS Logo.png" alt="LASAMBUS Logo" class="login-logo" />
      <h1 class="login-title">LASAMBUS</h1>
      <p class="login-subtitle">Lagos State Ambulance Service</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="identifier">LASAMBUS Email or Username</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          placeholder="LASAMBUS Email or Username"
          autocomplete="username"
        />
        <span class="error-msg" id="identifier-error">Email or Username is required.</span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
        />
        <span class="error-msg" id="password-error">Password is required.</span>
      </div>

      <span class="error-msg" id="credentials-error">Incorrect Email, Username or Password.</span>

      <button type="submit" class="btn btn-primary login-btn">
        <i class="bi bi-box-arrow-in-right"></i> Log In
      </button>
    </form>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
