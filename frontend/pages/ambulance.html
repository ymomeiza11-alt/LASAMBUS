<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — Ambulance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">Ambulances</h1>

      <div class="card">
        <!-- Search + Add button -->
        <div class="flex justify-between align-center mb-16" style="flex-wrap:wrap; gap:12px;">
          <div class="search-row">
            <input type="text" id="search-amb-code" placeholder="Ambulance Code" style="max-width:200px;" />
            <button class="btn btn-icon btn-primary" onclick="searchAmbulances()" title="Search">
              <i class="bi bi-search"></i>
            </button>
          </div>
          <!-- Admin-only button (hidden for non-admins in backend phase) -->
          <button class="btn btn-primary" onclick="openAmbOverlay('add')">
            <i class="bi bi-plus-lg"></i> Add Ambulance
          </button>
        </div>

        <!-- Ambulance table -->
        <div class="table-wrapper">
          <table id="ambulance-table">
            <thead>
              <tr>
                <th>Ambulance Code</th>
                <th>Vehicle Name</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="ambulance-table-body">
              <tr>
                <td><a href="#" class="amb-code-link" onclick="openAmbOverlay('edit', 'AMB-001'); return false;">AMB-001</a></td>
                <td>Toyota HiAce</td>
                <td>
                  <select class="status-select" onchange="updateAmbStatus(this, 'AMB-001')">
                    <option><span class="status-dot dot-available"></span>Available</option>
                    <option selected>Assigned</option>
                    <option>Unavailable</option>
                  </select>
                </td>
              </tr>
              <tr>
                <td><a href="#" class="amb-code-link" onclick="openAmbOverlay('edit', 'AMB-002'); return false;">AMB-002</a></td>
                <td>Ford Transit</td>
                <td>
                  <select class="status-select" onchange="updateAmbStatus(this, 'AMB-002')">
                    <option selected>Available</option>
                    <option>Assigned</option>
                    <option>Unavailable</option>
                  </select>
                </td>
              </tr>
              <tr>
                <td><a href="#" class="amb-code-link" onclick="openAmbOverlay('edit', 'AMB-003'); return false;">AMB-003</a></td>
                <td>Mercedes Sprinter</td>
                <td>
                  <select class="status-select" onchange="updateAmbStatus(this, 'AMB-003')">
                    <option>Available</option>
                    <option>Assigned</option>
                    <option selected>Unavailable</option>
                  </select>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- Add / Edit Ambulance Overlay -->
  <div class="overlay-backdrop" id="amb-overlay">
    <div class="overlay-panel" style="max-width:480px;">
      <button class="overlay-back-btn" onclick="closeAmbOverlay()">
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <h2 class="page-title" id="amb-overlay-title">Add Ambulance</h2>

      <form id="ambForm" novalidate>
        <div class="form-group">
          <label>Vehicle Name <span class="req">*</span></label>
          <input type="text" id="amb-vehicle-name" placeholder="e.g. Toyota HiAce" required />
          <span class="error-msg" id="err-amb-name">Vehicle Name is required.</span>
        </div>
        <div class="form-group">
          <label>Ambulance Code <span class="req">*</span></label>
          <input type="text" id="amb-code" placeholder="e.g. AMB-004" required />
          <span class="error-msg" id="err-amb-code">Ambulance Code is required.</span>
        </div>

        <div class="flex gap-8 mt-16">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-floppy"></i> Save
          </button>
          <button type="button" class="btn btn-danger hidden" id="btn-delete-amb" onclick="openDeleteConfirm('ambulance')">
            <i class="bi bi-trash"></i> Delete Ambulance
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Popup -->
  <div class="confirm-popup-backdrop" id="delete-popup">
    <div class="confirm-popup">
      <p id="delete-popup-msg">Are you sure you want to delete this ambulance?</p>
      <div class="popup-actions">
        <button class="btn btn-danger" onclick="confirmDelete()">
          <i class="bi bi-trash"></i> Delete
        </button>
        <button class="btn btn-secondary" onclick="closeDeleteConfirm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/ambulance.js"></script>
</body>
</html>
