<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — Ambulance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">Ambulances</h1>

      <div class="card">
        <div class="flex justify-between align-center mb-16" style="flex-wrap:wrap; gap:12px;">
          <div class="search-input-wrap">
            <input type="text" id="search-amb-code" placeholder="Search by Ambulance Code" />
            <button class="search-inner-btn" onclick="searchAmbulances()" title="Search">
              <i class="bi bi-search"></i>
            </button>
          </div>
          <button class="btn btn-primary" onclick="openAddOverlay()">
            <i class="bi bi-plus-lg"></i> Add Ambulance
          </button>
        </div>

        <div class="table-wrapper">
          <table id="ambulance-table">
            <thead>
              <tr>
                <th>Ambulance Code</th>
                <th>Plate Number</th>
                <th>Vehicle Name</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="ambulance-table-body">
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- Add / Edit Ambulance Overlay -->
  <div class="overlay-backdrop" id="amb-overlay">
    <div class="overlay-panel" style="max-width:480px;">
      <button class="overlay-back-btn" onclick="closeAmbOverlay()">
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <h2 class="page-title" id="amb-overlay-title">Add Ambulance</h2>

      <form id="ambForm" novalidate>
        <div class="form-group">
          <label>Vehicle Name <span class="req">*</span></label>
          <input type="text" id="amb-vehicle-name" placeholder="e.g. Toyota HiAce" />
          <span class="error-msg" id="err-amb-name">Vehicle Name is required.</span>
        </div>
        <div class="form-group">
          <label>Ambulance Code <span class="req">*</span></label>
          <input type="text" id="amb-code-input" placeholder="e.g. AMB-004" />
          <span class="error-msg" id="err-amb-code">Ambulance Code is required.</span>
        </div>
        <div class="form-group">
          <label>Plate Number</label>
          <input type="text" id="amb-plate-number" placeholder="e.g. LAG-123-AA" />
        </div>

        <!-- Status (edit mode only) -->
        <div class="form-group hidden" id="amb-status-group">
          <label>Status</label>
          <select id="amb-status" onchange="toggleAmbUnavailableReason(this.value)">
            <option value="Available">Available</option>
            <option value="Assigned">Assigned</option>
            <option value="Unavailable">Unavailable</option>
          </select>
        </div>
        <div class="form-group hidden" id="amb-unavailable-reason-group">
          <label>Reason for Unavailability <span class="req">*</span></label>
          <textarea id="amb-unavailable-reason" placeholder="Explain why this ambulance is unavailable"></textarea>
        </div>

        <div class="flex gap-8 mt-16">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-danger hidden" id="btn-delete-amb" onclick="openDeleteConfirm()">Delete Ambulance</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Popup -->
  <div class="confirm-popup-backdrop" id="delete-popup">
    <div class="confirm-popup">
      <p>Are you sure you want to delete this Ambulance?</p>
      <div class="popup-actions">
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-secondary" onclick="closeDeleteConfirm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/ambulance.js"></script>
</body>
</html>
