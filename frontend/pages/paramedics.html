<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASAMBUS — Paramedics</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <div class="lasambus-layout">
    <div id="header-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="lasambus-main">
      <h1 class="page-title">Paramedics</h1>

      <div class="card">
        <div class="flex justify-between align-center mb-16" style="flex-wrap:wrap; gap:12px;">
          <div class="search-input-wrap">
            <input type="text" id="search-paramedic" placeholder="Search by username or name" />
            <button class="search-inner-btn" onclick="searchParamedics()" title="Search">
              <i class="bi bi-search"></i>
            </button>
          </div>
          <button class="btn btn-primary" onclick="openParamedicOverlay('add')">
            <i class="bi bi-plus-lg"></i> Add Paramedic
          </button>
        </div>

        <div class="table-wrapper">
          <table id="paramedics-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Name</th>
                <th>Cadre</th>
                <th>Grade Level</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="paramedics-table-body">
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- Add / Edit Paramedic Overlay -->
  <div class="overlay-backdrop" id="paramedic-overlay">
    <div class="overlay-panel" style="max-width:560px;">
      <button class="overlay-back-btn" onclick="closeParamedicOverlay()">
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <h2 class="page-title" id="paramedic-overlay-title">Add Paramedic</h2>

      <form id="paramedicForm" novalidate>
        <div class="form-row">
          <div class="form-group" style="max-width:130px;">
            <label>Title <span class="req">*</span></label>
            <select id="p-title">
              <option value="">--</option>
              <option>Mr</option><option>Miss</option><option>Mrs</option><option>Other</option>
            </select>
            <span class="error-msg" id="err-p-title">Required.</span>
          </div>
          <div class="form-group">
            <label>First Name <span class="req">*</span></label>
            <input type="text" id="p-firstname" placeholder="First Name" />
            <span class="error-msg" id="err-p-firstname">Required.</span>
          </div>
          <div class="form-group">
            <label>Last Name <span class="req">*</span></label>
            <input type="text" id="p-lastname" placeholder="Last Name" />
            <span class="error-msg" id="err-p-lastname">Required.</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Username <span class="req">*</span></label>
            <input type="text" id="p-username" placeholder="Username" />
            <span class="error-msg" id="err-p-username">Required.</span>
          </div>
          <div class="form-group">
            <label>Email <span class="req">*</span></label>
            <input type="email" id="p-email" placeholder="Email" />
            <span class="error-msg" id="err-p-email">Required.</span>
          </div>
        </div>

        <div class="form-group" id="password-group">
          <label>Password <span class="req">*</span></label>
          <input type="password" id="p-password" placeholder="Password" />
          <span class="error-msg" id="err-p-password">Required.</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cadre</label>
            <input type="text" id="p-cadre" placeholder="e.g. Senior Paramedic" />
          </div>
          <div class="form-group">
            <label>Grade Level</label>
            <input type="text" id="p-grade" placeholder="e.g. GL-08" />
          </div>
        </div>

        <div class="form-group">
          <label>Set as Admin?</label>
          <select id="p-is-admin">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>

        <!-- Status (edit mode only) -->
        <div class="form-group hidden" id="p-status-group">
          <label>Status</label>
          <select id="p-status" onchange="toggleParamedicUnavailableReason(this.value)">
            <option value="Available">Available</option>
            <option value="Assigned">Assigned</option>
            <option value="Unavailable">Unavailable</option>
          </select>
        </div>
        <div class="form-group hidden" id="p-unavailable-reason-group">
          <label>Reason for Unavailability <span class="req">*</span></label>
          <textarea id="p-unavailable-reason" placeholder="Explain why this paramedic is unavailable"></textarea>
        </div>

        <!-- Change password (edit + admin only) -->
        <div id="change-password-section" class="hidden" style="border-top:1px solid #eee; padding-top:16px; margin-top:16px;">
          <h4 style="margin-bottom:12px; color:var(--color-dark-blue); font-size:0.95rem;">Change Password</h4>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="p-new-password" placeholder="New Password" />
          </div>
          <button type="button" class="btn btn-warning" onclick="changeParamedicPassword()">Update Password</button>
        </div>

        <div class="flex gap-8 mt-16">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-danger hidden" id="btn-delete-paramedic" onclick="openDeleteParamedic()">Delete Paramedic</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Popup -->
  <div class="confirm-popup-backdrop" id="paramedic-delete-popup">
    <div class="confirm-popup">
      <p>Are you sure you want to delete this Paramedic?</p>
      <div class="popup-actions">
        <button class="btn btn-danger" onclick="confirmDeleteParamedic()">Delete</button>
        <button class="btn btn-secondary" onclick="closeDeleteParamedicPopup()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/paramedics.js"></script>
</body>
</html>
